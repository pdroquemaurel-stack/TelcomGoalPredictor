services:
  - type: web
    name: pan-african-football-predictor
    env: node
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run build
    preDeployCommand: npm run prisma:deploy
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pan-african-football-db
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: FOOTBALL_DATA_API_KEY
        sync: false

databases:
  - name: pan-african-football-db
    plan: free
